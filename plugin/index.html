<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>davinci-mcp-fat</title>
  <style>
    :root { --bg:#14181c; --fg:#f3e9d2; --muted:#7e8389; --accent:#b8956a;
            --ok:#8fd984; --err:#ff7a7a; }
    html,body { margin:0; padding:0; height:100%; background:var(--bg); color:var(--fg);
                font-family:-apple-system,system-ui,sans-serif; }
    .pad { padding:22px 26px; }
    h1 { margin:0 0 4px; font-weight:500; font-size:18px; letter-spacing:0.4px; }
    .ver { color:var(--muted); font-size:11px; margin-bottom:22px; }
    .row { display:flex; justify-content:space-between; padding:8px 0;
           border-bottom:1px solid #20262d; }
    .row:last-child { border-bottom:none; }
    .label { color:var(--muted); font-size:12px; }
    .val { font-family:ui-monospace,Menlo,monospace; font-size:12px; }
    .ok { color:var(--ok); } .err { color:var(--err); }
    .hint { margin-top:18px; color:var(--muted); font-size:11px; line-height:1.5; }
    .hint code { background:#0c0f12; padding:2px 5px; border-radius:3px; }
  </style>
</head>
<body>
  <div class="pad">
    <h1>davinci-mcp-fat</h1>
    <div class="ver" id="ver">v0.1.0</div>
    <div class="row"><span class="label">Resolve API bound</span><span id="resolve" class="val">…</span></div>
    <div class="row"><span class="label">HTTP server</span><span id="http" class="val">…</span></div>
    <div class="row"><span class="label">Last request from MCP</span><span id="req" class="val">none yet</span></div>
    <div class="hint">
      Run the MCP server: <code>npm run start --prefix mcp-server</code><br>
      Test from terminal: <code>curl -X POST localhost:9087/command -d '{"command":"ping"}'</code>
    </div>
  </div>
  <script>
    function paint(s) {
      document.getElementById('ver').textContent = 'v' + s.version + ' · port ' + s.http_port;
      const r = document.getElementById('resolve');
      r.textContent = s.resolve_bound ? '✓ connected' : '✗ not bound';
      r.className = 'val ' + (s.resolve_bound ? 'ok' : 'err');
      const h = document.getElementById('http');
      h.textContent = s.http_listening ? `✓ listening :${s.http_port}` : '… starting';
      h.className = 'val ' + (s.http_listening ? 'ok' : '');
      document.getElementById('req').textContent =
        s.last_request_at ? new Date(s.last_request_at).toLocaleTimeString() : 'none yet';
    }
    window.fat.getStatus().then(paint);
    window.fat.onStatus(paint);
  </script>
</body>
</html>
