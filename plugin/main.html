<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>davinci-mcp-fat</title>
  <style>
    :root {
      --bg: #14181c;
      --fg: #f3e9d2;
      --muted: #7e8389;
      --accent: #b8956a;
      --ok: #8fd984;
      --err: #ff7a7a;
    }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--fg);
                 font-family: -apple-system, system-ui, sans-serif; }
    .pad { padding: 22px 26px; }
    h1 { margin: 0 0 4px; font-weight: 500; font-size: 18px; letter-spacing: 0.4px; }
    .ver { color: var(--muted); font-size: 11px; margin-bottom: 22px; }
    .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #20262d; }
    .row:last-child { border-bottom: none; }
    .label { color: var(--muted); font-size: 12px; }
    .val { font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
    .ok { color: var(--ok); }
    .err { color: var(--err); }
    .log { margin-top: 18px; height: 110px; overflow-y: auto; background: #0c0f12; padding: 8px 10px;
           border-radius: 4px; font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--muted); }
    .log .line { padding: 2px 0; }
  </style>
</head>
<body>
  <div class="pad">
    <h1>davinci-mcp-fat</h1>
    <div class="ver">v0.1.0 · phase 1 scaffold</div>

    <div class="row"><span class="label">Plugin loaded</span><span id="loaded" class="val ok">✓ yes</span></div>
    <div class="row"><span class="label">WebSocket server</span><span id="ws" class="val">starting…</span></div>
    <div class="row"><span class="label">MCP client connected</span><span id="mcp" class="val">waiting</span></div>
    <div class="row"><span class="label">Resolve API</span><span id="api" class="val">…</span></div>

    <div class="log" id="log"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
